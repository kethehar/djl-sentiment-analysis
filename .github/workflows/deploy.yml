name: Build and Deploy Sentiment Analysis (Multi-Container)

on:
  push:
    branches:
      - master
  workflow_dispatch: 

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Consumer Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/djl-serving-consumer:latest

      - name: Build Model-Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./model-server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/djl-serving:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mdm-serving-kethehar'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          configuration-file: docker-compose.yml
